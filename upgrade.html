<!DOCTYPE html>
<html lang="ja">
<head>
  <script src="cache-purge.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>継続登録 | AI学習コーチ塾</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="lp.css?v=20260424-mobile">
  <link rel="stylesheet" href="checkout.css">
  <style>
    .up-main { min-height: 100vh; padding: 2rem 1rem; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
    .up-card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 16px; padding: 2.5rem 2rem; max-width: 560px; width: 100%; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); }
    .up-head { text-align: center; margin-bottom: 1.5rem; }
    .up-head h1 { font-size: 1.5rem; font-weight: 900; background: linear-gradient(135deg, var(--primary-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
    .up-head p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.7; }
    .plan-group { display: grid; gap: 0.75rem; margin: 1.5rem 0; }
    .plan-option { background: rgba(0,0,0,0.3); border: 2px solid var(--panel-border); border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: all 0.15s; }
    .plan-option:hover { border-color: var(--primary); }
    .plan-option.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.08); }
    .plan-option input { display: none; }
    .plan-name { font-size: 1rem; font-weight: 800; margin-bottom: 0.2rem; }
    .plan-tagline { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.5rem; }
    .plan-price { font-size: 1.5rem; font-weight: 900; background: linear-gradient(135deg, #fbbf24, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .plan-price-unit { font-size: 0.75rem; color: var(--text-dim); }
    .up-cta { width: 100%; padding: 1rem; margin-top: 1.25rem; background: linear-gradient(135deg, var(--primary), var(--accent)); border: none; color: white; font-size: 1rem; font-weight: 800; border-radius: 10px; cursor: pointer; font-family: inherit; }
    .up-cta:disabled { opacity: 0.6; cursor: not-allowed; }
    .up-foot { margin-top: 1.25rem; font-size: 0.78rem; color: var(--text-muted); text-align: center; line-height: 1.7; }
    .error-box { display:none; margin-top:1rem; padding: 0.85rem; background: rgba(239, 68, 68, 0.12); border:1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; color: #fca5a5; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="floating-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

  <main class="up-main">
    <div class="up-card">
      <div class="up-head">
        <h1>🎓 継続登録</h1>
        <p>
          7日間の無料体験はいかがでしたか？<br>
          引き続きご利用される方は、以下から月額プランを選択してください。<br>
          <small style="color:var(--text-muted);">※ 初月に入塾金 ¥10,000 が請求書に加算されます</small>
        </p>
      </div>

      <form id="upgradeForm">
        <label for="email" style="display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.4rem;">メールアドレス</label>
        <input type="email" id="email" name="email" required autocomplete="email"
               style="width:100%; padding:0.85rem 1rem; background:rgba(0,0,0,0.3); border:1px solid var(--panel-border); border-radius:10px; color:var(--text); font-size:1rem; font-family:inherit; box-sizing:border-box;"
               placeholder="parent@example.com">

        <div class="plan-group" id="planGroup">
          <label class="plan-option selected">
            <input type="radio" name="plan" value="standard" checked>
            <div class="plan-name">📘 スタンダード</div>
            <div class="plan-tagline">1名まで・AIチューター・教材生成・週次レポート</div>
            <div><span class="plan-price">¥24,980</span><span class="plan-price-unit">/月（税込）</span></div>
          </label>
          <label class="plan-option">
            <input type="radio" name="plan" value="premium">
            <div class="plan-name">🔥 プレミアム <span style="color:#fbbf24; font-size:0.75rem;">人気No.1</span></div>
            <div class="plan-tagline">1名まで・全機能解放（模試・過去問・面談記録等）</div>
            <div><span class="plan-price">¥39,800</span><span class="plan-price-unit">/月（税込）</span></div>
          </label>
          <label class="plan-option">
            <input type="radio" name="plan" value="family">
            <div class="plan-name">👨‍👩‍👧 家族プラン</div>
            <div class="plan-tagline">最大3名まで共有可能・兄弟姉妹で利用</div>
            <div><span class="plan-price">¥59,800</span><span class="plan-price-unit">/月（税込）</span></div>
          </label>
        </div>

        <button type="submit" id="submitBtn" class="up-cta">💳 決済画面に進む →</button>
        <div id="errorBox" class="error-box"></div>
      </form>

      <div class="up-foot">
        7日間の無料体験は ¥0 でしたので、本日のお手続きが初回課金となります。<br>
        ご不明な点は <a href="mailto:info@trillion-ai-juku.com" style="color:var(--primary-light);">info@trillion-ai-juku.com</a> まで。<br>
        <a href="lp.html" style="color:var(--primary-light);">← LPに戻る</a>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin.includes(':8090') ? 'http://localhost:8000' : window.location.origin;
    const params = new URLSearchParams(window.location.search);
    if (params.get('email')) document.getElementById('email').value = params.get('email');

    // Plan selection visual
    const planOptions = document.querySelectorAll('.plan-option');
    planOptions.forEach(opt => {
      const input = opt.querySelector('input');
      input.addEventListener('change', () => {
        planOptions.forEach(o => o.classList.remove('selected'));
        if (input.checked) opt.classList.add('selected');
      });
    });

    document.getElementById('upgradeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errBox = document.getElementById('errorBox');
      const plan = document.querySelector('input[name="plan"]:checked').value;
      const email = document.getElementById('email').value.trim();

      btn.disabled = true;
      btn.textContent = '⏳ 決済セッションを準備中...';
      errBox.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/api/stripe/checkout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ plan, email, name: '' }),
        });
        const data = await res.json();
        if (res.ok && data.checkout_url) {
          window.location.href = data.checkout_url;
        } else {
          throw new Error(data.detail || '決済セッションの作成に失敗しました');
        }
      } catch (err) {
        errBox.textContent = '⚠️ ' + err.message;
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '💳 決済画面に進む →';
      }
    });
  </script>
</body>
</html>
