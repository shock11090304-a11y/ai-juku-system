<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Decorative dots -->
  <g fill="#6366f1" opacity="0.15">
    <circle cx="100" cy="100" r="4"/>
    <circle cx="200" cy="150" r="3"/>
    <circle cx="1050" cy="120" r="5"/>
    <circle cx="1150" cy="250" r="4"/>
    <circle cx="150" cy="500" r="4"/>
    <circle cx="1100" cy="550" r="3"/>
    <circle cx="950" cy="450" r="4"/>
  </g>

  <!-- Logo / icon area -->
  <text x="600" y="165" text-anchor="middle" font-size="100" font-family="system-ui">🎓</text>

  <!-- Badge -->
  <g transform="translate(600, 210)">
    <rect x="-140" y="-22" width="280" height="40" rx="20" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-opacity="0.4" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" fill="#f9a8d4" font-size="17" font-weight="700" font-family="system-ui">
      🔥 先着100名様 3日間無料体験
    </text>
  </g>

  <!-- Main title -->
  <text x="600" y="320" text-anchor="middle" font-size="62" font-weight="900" font-family="system-ui, -apple-system, sans-serif" fill="white" letter-spacing="-1">
    AI学習コーチ塾
  </text>

  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-size="32" font-weight="700" font-family="system-ui" fill="url(#titleGrad)">
    24時間AIチューター付き
  </text>
  <text x="600" y="440" text-anchor="middle" font-size="32" font-weight="700" font-family="system-ui" fill="url(#titleGrad)">
    完全個別最適化学習
  </text>

  <!-- Features -->
  <g transform="translate(600, 510)" font-family="system-ui" fill="#9ca3af" font-size="20" text-anchor="middle">
    <text x="0" y="0">💬 24h質問対応 &#160;&#160;/&#160;&#160; 📊 AI学習診断 &#160;&#160;/&#160;&#160; ✍️ 10倍添削</text>
    <text x="0" y="35">🎯 志望校別カリキュラム &#160;&#160;/&#160;&#160; 🧪 AI問題生成 &#160;&#160;/&#160;&#160; 🎙 スピーキングAI</text>
  </g>

  <!-- Bottom branding -->
  <text x="600" y="595" text-anchor="middle" font-size="15" font-family="system-ui" fill="#6b7280">
    Powered by Claude AI · 従来塾の 1/3 の価格で難関校合格を目指す
  </text>
</svg>
